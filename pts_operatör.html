<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTS Operatörskontroll</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; background: #f5f5f5; color: #1a1a1a; padding: 32px 24px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat { background: #f5f5f5; border-radius: 8px; padding: 12px 16px; min-width: 120px; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 2px; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-telia .stat-val { color: #1a6b2f; }
  .stat-other .stat-val { color: #8b1a1a; }
  .stat-miss .stat-val { color: #7a5000; }
  label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
  textarea { width: 100%; min-height: 120px; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; font-family: "SF Mono", "Consolas", monospace; font-size: 13px; resize: vertical; outline: none; }
  textarea:focus { border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  button { border: 1px solid #ccc; background: #fff; border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; transition: background 0.1s; }
  button:hover { background: #f0f0f0; }
  button.primary { background: #185FA5; color: #fff; border-color: #185FA5; font-size: 14px; padding: 9px 20px; }
  button.primary:hover { background: #1050889; }
  button.primary:disabled { background: #aac4e0; border-color: #aac4e0; cursor: not-allowed; }
  #statusMsg { font-size: 12px; color: #666; }
  .progress-wrap { display: none; margin-top: 12px; }
  .progress-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .progress-track { height: 4px; background: #e8e8e8; border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 4px; background: #185FA5; width: 0%; transition: width 0.3s; }
  .filter-row { display: none; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .filter-row span { font-size: 12px; color: #888; }
  .filter-row button { padding: 4px 10px; font-size: 12px; }
  .filter-row button.active { background: #185FA5; color: #fff; border-color: #185FA5; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f5f5f5; padding: 8px 12px; text-align: left; font-weight: 500; font-size: 12px; color: #666; border-bottom: 1px solid #e0e0e0; }
  td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) { background: #fafafa; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .badge-green { background: #d4edda; color: #155724; }
  .badge-red { background: #f8d7da; color: #721c24; }
  .badge-amber { background: #fff3cd; color: #856404; }
  .mono { font-family: "SF Mono", "Consolas", monospace; font-size: 12px; }
  #tableWrap { display: none; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
</style>
</head>
<body>

<h1>PTS Operatörskontroll</h1>
<p class="subtitle">Kontrollerar aktuell operatör via Post- och telestyrelsens öppna API</p>

<div class="stats">
  <div class="stat"><div class="stat-label">Sökta</div><div class="stat-val" id="statTotal">0</div></div>
  <div class="stat stat-telia"><div class="stat-label">Telia / Halebop</div><div class="stat-val" id="statTelia">0</div></div>
  <div class="stat stat-other"><div class="stat-label">Annan operatör</div><div class="stat-val" id="statOther">0</div></div>
  <div class="stat stat-miss"><div class="stat-label">Ingen träff</div><div class="stat-val" id="statMiss">0</div></div>
</div>

<div class="card">
  <label>Klistra in telefonnummer — ett per rad, kommaseparerat, med eller utan 0 eller +46</label>
  <textarea id="inputNums" placeholder="0761720020&#10;702335248&#10;+46 724 56 61 26&#10;0706011304"></textarea>
  <div class="btn-row">
    <button class="primary" id="btnSearch" onclick="doSearch()">Sök operatör via PTS</button>
    <button onclick="clearAll()">Rensa</button>
    <button id="btnExport" onclick="exportCSV()" style="display:none;">Exportera CSV</button>
    <span id="statusMsg"></span>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Söker...</div>
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  </div>
</div>

<div class="filter-row" id="filterRow">
  <span>Filtrera:</span>
  <button class="active" id="f-alla" onclick="setFilter('alla')">Alla</button>
  <button id="f-telia" onclick="setFilter('telia')">Telia</button>
  <button id="f-annan" onclick="setFilter('annan')">Annan operatör</button>
  <button id="f-miss" onclick="setFilter('miss')">Ingen träff</button>
</div>

<div id="tableWrap">
  <table>
    <thead><tr>
      <th style="width:150px;">Nummer</th>
      <th>Operatör (PTS)</th>
      <th style="width:120px;">Status</th>
    </tr></thead>
    <tbody id="resultBody"></tbody>
  </table>
</div>

<script>
let allResults = [];

function parseNumbers(raw) {
  return raw
    .split(/[\n,;]+/)
    .map(s => s.trim().replace(/[\s\-\(\)\+]/g, ''))
    .map(s => (s.startsWith('46') && s.length >= 11) ? '0' + s.slice(2) : s)
    .filter(s => /^0[0-9]{8,9}$/.test(s))
    .filter((v, i, a) => a.indexOf(v) === i);
}

function toPair(num) {
  const s = num.slice(1);
  return s.slice(0, 2) + '-' + s.slice(2);
}

function statusOf(op) {
  if (!op) return 'miss';
  const lo = op.toLowerCase();
  if (lo.includes('telia') || lo.includes('halebop')) return 'telia';
  return 'annan';
}

function badge(op) {
  if (!op) return '<span class="badge badge-amber">Ingen träff</span>';
  if (statusOf(op) === 'telia') return `<span class="badge badge-green">${op.trim()}</span>`;
  return `<span class="badge badge-red">${op.trim()}</span>`;
}

async function lookupBatch(nums) {
  const pairs = nums.map(toPair).join(',');
  const url = `https://data.pts.se/v1/operator/${pairs}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  const items = Array.isArray(data) ? data : [data];
  const map = {};
  for (const item of items) {
    const k = (item.number || '').trim();
    const op = (item.name || item.Name || '').trim();
    if (k && op) map[k] = op;
  }
  return map;
}

async function doSearch() {
  const nums = parseNumbers(document.getElementById('inputNums').value);
  if (!nums.length) {
    document.getElementById('statusMsg').textContent = 'Inga giltiga svenska mobilnummer hittades.';
    return;
  }

  document.getElementById('btnSearch').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('filterRow').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('btnExport').style.display = 'none';
  document.getElementById('statusMsg').textContent = '';
  allResults = [];

  const BATCH = 200;
  const batches = [];
  for (let i = 0; i < nums.length; i += BATCH) batches.push(nums.slice(i, i + BATCH));

  const resultMap = {};
  for (let bi = 0; bi < batches.length; bi++) {
    document.getElementById('progressBar').style.width = Math.round((bi / batches.length) * 100) + '%';
    document.getElementById('progressLabel').textContent =
      `Söker ${bi * BATCH + 1}–${Math.min((bi + 1) * BATCH, nums.length)} av ${nums.length}...`;
    try {
      const map = await lookupBatch(batches[bi]);
      for (const num of batches[bi]) {
        const pair = toPair(num);
        if (map[pair]) resultMap[num] = map[pair];
      }
    } catch (e) {
      console.error('Batch error:', e);
    }
    if (bi < batches.length - 1) await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('progressBar').style.width = '100%';
  allResults = nums.map(num => ({ num, op: resultMap[num] || null }));

  updateStats();
  renderTable('alla');
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('filterRow').style.display = 'flex';
  document.getElementById('tableWrap').style.display = 'block';
  document.getElementById('btnExport').style.display = 'inline-block';
  document.getElementById('btnSearch').disabled = false;

  const misses = allResults.filter(r => !r.op).length;
  document.getElementById('statusMsg').textContent =
    `${allResults.length} nummer sökta` + (misses > 0 ? ` — ${misses} utan träff` : '') + '.';
}

function updateStats() {
  document.getElementById('statTotal').textContent = allResults.length;
  document.getElementById('statTelia').textContent = allResults.filter(r => statusOf(r.op) === 'telia').length;
  document.getElementById('statOther').textContent = allResults.filter(r => statusOf(r.op) === 'annan').length;
  document.getElementById('statMiss').textContent  = allResults.filter(r => statusOf(r.op) === 'miss').length;
}

function setFilter(f) {
  ['alla', 'telia', 'annan', 'miss'].forEach(k => {
    const btn = document.getElementById('f-' + k);
    btn.classList.toggle('active', k === f);
  });
  renderTable(f);
}

function renderTable(f) {
  const body = document.getElementById('resultBody');
  body.innerHTML = '';
  const rows = f === 'alla' ? allResults : allResults.filter(r => statusOf(r.op) === f);
  rows.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="mono">${row.num}</td>
      <td>${row.op || '<span style="color:#aaa;">—</span>'}</td>
      <td>${badge(row.op)}</td>`;
    body.appendChild(tr);
  });
}

function exportCSV() {
  const rows = [['Nummer', 'Operatör', 'Status']];
  allResults.forEach(r => rows.push([r.num, r.op || '', statusOf(r.op)]));
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
  a.download = 'pts_operatorer.csv';
  a.click();
}

function clearAll() {
  document.getElementById('inputNums').value = '';
  document.getElementById('resultBody').innerHTML = '';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('filterRow').style.display = 'none';
  document.getElementById('btnExport').style.display = 'none';
  document.getElementById('statusMsg').textContent = '';
  ['statTotal', 'statTelia', 'statOther', 'statMiss'].forEach(id =>
    document.getElementById(id).textContent = '0');
  allResults = [];
}
</script>
</body>
</html>
